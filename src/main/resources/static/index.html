<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>PulseDesk</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 800px;
        margin: 40px auto;
        padding: 0 20px;
      }
      h1 {
        color: #333;
      }
      h2 {
        color: #555;
        margin-top: 30px;
      }
      textarea {
        width: 100%;
        height: 80px;
        padding: 8px;
        font-size: 14px;
      }
      select,
      button {
        padding: 8px 16px;
        font-size: 14px;
        margin-top: 8px;
      }
      button {
        background: #2563eb;
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 4px;
      }
      button:hover {
        background: #1d4ed8;
      }
      #status {
        margin-top: 10px;
        color: green;
        min-height: 20px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
      }
      th,
      td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: left;
        font-size: 13px;
      }
      th {
        background: #f3f4f6;
      }
      .review-needed {
        color: #b91c1c;
        font-weight: bold;
        background-color: #fee2e2;
      }
    </style>
  </head>
  <body>
    <h1>PulseDesk</h1>

    <h2>Submit Comment</h2>
    <textarea
      id="commentText"
      placeholder="Describe your issue or feedback..."
      maxlength="100"
    ></textarea
    ><br />
    <select id="channel">
      <option value="web">Web</option>
      <option value="app">App</option>
      <option value="chat">Chat</option>
    </select>
    <button onclick="submitComment()">Submit</button>
    <div id="status"></div>

    <h2>Comments</h2>
    <table id="commentsTable">
      <tr>
        <th>ID</th>
        <th>Text</th>
        <th>Channel</th>
        <th>Ticket?</th>
      </tr>
    </table>

    <h2>Tickets</h2>
    <table id="ticketsTable">
      <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Category</th>
        <th>Priority</th>
        <th>Summary</th>
      </tr>
    </table>

    <script>
      async function submitComment() {
        // Grab values and clean up whitespace
        const text = document.getElementById("commentText").value.trim();
        const channel = document.getElementById("channel").value;

        if (!text) return; // This prevents empty submissions early

        const statusElement = document.getElementById("status");
        statusElement.style.color = "black";
        statusElement.textContent = "Submitting...";

        const res = await fetch("/comments", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text, channel }),
        });

        // Lastly we handle the UI update based on the AI decision
        const savedData = await res.json();

        if (savedData.requiresManualReview) {
          statusElement.style.color = "#b91c1c";
          statusElement.textContent =
            "⚠️ Could not process automatically — needs manual review";
        } else if (savedData.convertedToTicket) {
          statusElement.style.color = "green";
          statusElement.textContent = "✅ Ticket created!";
        } else {
          statusElement.style.color = "green";
          statusElement.textContent = "✅ Submitted (no ticket needed)";
        }

        document.getElementById("commentText").value = "";

        loadData(); // Refresh the tables
      }

      async function loadData() {
        const comments = await fetch("/comments").then((r) => r.json());
        const tickets = await fetch("/tickets").then((r) => r.json());

        const commentTable = document.getElementById("commentsTable");
        commentTable.innerHTML =
          "<tr><th>ID</th><th>Text</th><th>Channel</th><th>Ticket?</th></tr>";
        comments.reverse().forEach((c) => {
          const statusText = c.requiresManualReview
            ? "⚠️ Manual Review"
            : c.convertedToTicket
              ? "Yes"
              : "No";
          const rowClass = c.requiresManualReview ? "review-needed" : "";
          commentTable.innerHTML += `
          <tr class="${rowClass}">
            <td>${c.id}</td>
            <td>${c.text}</td>
            <td>${c.channel}</td>
            <td>${statusText}</td>
          </tr>
`;
        });

        const ticketTable = document.getElementById("ticketsTable");
        ticketTable.innerHTML =
          "<tr><th>ID</th><th>Title</th><th>Category</th><th>Priority</th><th>Summary</th></tr>";
        tickets.reverse().forEach((t) => {
          ticketTable.innerHTML += `<tr><td>${t.id}</td><td>${t.title}</td><td>${t.category}</td><td>${t.priority}</td><td>${t.summary}</td></tr>`;
        });
      }

      loadData();
    </script>
  </body>
</html>
